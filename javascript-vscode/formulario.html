<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <!-- tag para criar formularios-->
     <h1>Formulario Aqui</h1>
     <a href="index.html">Voltar para pagina principal</a>1
     <form action=""><!-- Campo action indicará pra onde irá a informação de conteudo--> 
        <!-- tag tipo input não tem fechamento--> 
        <label for="campo_nome">Nome:</label><!-- tag tipo legenda que vai antes ou depois-->
        <input id="campo_nome" type="text" placeholder="Digite seu nome aqui" required>  
        <!-- id é como identificador unico a um elemento unico na pagina, se conecta ao "'for' do label" bom para mobile  -->
        <!-- placeholde é tipo um a legenda para usuario, tag entrada do tipo de texto-->
        <br><br>
        
        <label for="campo_sobrenome">Sobrenome:</label><!-- tag tipo legenda que vai antes ou depois-->
        <input id="campo_sobrenome" type="text" placeholder="Digite seu sobrenome aqui" required>  
        <br><br>
        
        <label for="campo_senha">Senha:</label><!-- tag tipo legenda que vai antes ou depois-->
        <input id="campo_senha" type="password" placeholder="Digite sua senha aqui" required>  
        <br><br>

        <label for="campo_email">E-mail:</label><!-- tag tipo legenda que vai antes ou depois--> 
        <input id="campo_email" type="email" placeholder="Digite um e-mail aqui" required>  
        <br><br>
        

        <h2>Animal de Estimação</h2>
        <input type="radio" name="animal" value="Cachorro" id="dog"> 
        <label for="dog">Cachorro</label>
        <br><br>
        
        <input type="radio" name="animal" value="gato" id="cat"> 
        <label for="cat">Gatoo</label>
        <br><br>
        <input type="radio" name="animal" value="passarinho" id="bird"> 
        <label for="bird">Passarinho</label>
        <br><br>

        <h2>O que voçê tem em casa</h2> 
        <input type="checkbox" name="item1" value="TV" id="item1"> <!-- tag tipo checkbo pode marcar multiplar esolhar--> 
        <label for="item1">TV</label>
        <br>
        <input type="checkbox" name="item2" value="Geladeira" id="item2">
        <label for="item2">Geladeira</label>
        <br>
        <input type="checkbox" name="item3" value="Computador" id="item3">
        <label for="item3">Computador</label>
        <br>

        <h2>Escolha uma Cor</h2>
        <select name="cores"> <!--multiplas escolhas--> 
            <option selected disabled value="">Selecione um Cor</option>    
            <option value="azul">Azul</option>
            <option value="amarelo">Amarelo</option>
            <option value="branco">Branco</option>
            <option value="preto">Preto</option>

        </select> <!--multiplas escolhas--> 
        <br>

        <input type="submit" value="Enviar Formulario"> <!-- tag para enviar conteudo--> 



     </form> <br>



</body>
</html>
