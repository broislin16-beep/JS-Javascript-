
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"> 
    <!--Sem problema para acentuação, adionar caracteres  -->>
    <meta http-equiv="X - UA-Compatible" content="IE-edge"> 
    <!--Compartibilidade com internet explore, melhora o navegador explore -->>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <!-- Area visual do usuario na pagina, tela ira se adpatar ao dispositivos do usuario -->>
    <meta name="description" content="Esse é um site de estudo"> 
    <!-- Pequena descrição do site ficar no site -->>
    <meta name="keywords" content="ex:curso de app, ajudao SEO">
    <!-- Palavras relacionado ao conteudo do site -->>
    <meta name ="author" content="Bruce Alves Vieira">
    <!-- Autor do site-->>
    <title>teste link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4e73df;
            box-shadow: 0 0 8px rgba(78,115,223,0.4);
        }

        input:valid {
            border-color: #1cc88a;
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #e74a3b;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
            transform: translateY(-2px);
        }

        .success-message {
            text-align: center;
            color: #1cc88a;
            margin-top: 10px;
            display: none;
        }

        /* Checkbox personalizado */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
    }
</style>

</head>

<body>

<div class="container">
    <h2>Cadastro</h2>
    <form>
        
        <div class="input-group">
            <label>Nome</label>
            <input type="text" placeholder="Digite seu nome" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Digite seu email" required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha" required minlength="6">
        </div>

        <div class="input-group">
            <label>Gênero</label>
            <select required>
                <option value="">Selecione</option>
                <option>Masculino</option>
                <option>Feminino</option>
                <option>Outro</option>
            </select>
        </div>

        <div class="input-group">
            <label>Mensagem</label>
            <textarea rows="3" placeholder="Escreva algo..."></textarea>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" required>
            <label>Aceito os termos</label>
        </div>

        <br>
        <button type="submit">Enviar</button>

        <div class="success-message">
            ✔ Formulário enviado com sucesso!
        </div>

    </form>
</div>
</body>
</html>
